name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger build on version tag pushes (e.g. v1.0.0)

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Package App
        run: npm run package
        env:
          # Skip code signing for public developer builds
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Release Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/NoDistraction-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
